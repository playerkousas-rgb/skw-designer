<script type="text/babel">
  const { useState } = React;

  // 移除 lucide-react import，改用 data-lucide
  // 移除 Firebase 全部（單檔無法用）
  // const ADMIN_EMAIL = 'ai@skwscout.org.hk';
  const VERSION = 'V2.4.9';

  const WOGGLE_CORE_DEFINITION = `You are an expert in scouting uniform accessories. A scout woggle (also called neckerchief slide or scarf slide) is a FUNCTIONAL RING-SHAPED HOLDER specifically designed to secure a triangular scout neckerchief/scarf around the neck. It is ALWAYS a cylindrical, tubular, or looped structure with a central hole/channel large enough for the rolled/folded neckerchief ends to pass through and slide/adjust. It is NOT a flat pin, badge, brooch, medal, lapel pin, clip, or any back-attached jewelry. The design must emphasize 3D ring form, depth, thickness (usually 1-2cm thick/deep), smooth inner surface for sliding, and realistic holding of a fabric scarf.`;

  const TRANSLATIONS = {
    zh: {
      title: `童設計 ${VERSION}`,
      tabs: { idea: '理念', color: '色彩', ref: '參考', craft: '工藝', tweak: '微調' },
      // ... 保留你原有的 fields, categories, buttons, prompts ...
    },
    en: { /* 同上 */ }
  };

  const SHAPE_OPTIONS = ['圓形', '盾形/徽章形', '方形/矩形', '五角形', '異形/不規則形', '自訂'];

  const CATEGORY_CONFIG = { /* 保留你原有的 config */ };

  function App() {
    const [language, setLanguage] = useState('zh');
    const [selectedCategory, setSelectedCategory] = useState('necker');
    const [colorCount, setColorCount] = useState(8);
    const [colors, setColors] = useState(['#6366F1', '#3B82F6', '#2DD4BF', '#F472B6', '#E2E8F0', '#0F172A', '#F59E0B', '#EF4444']);
    const [designPrompt, setDesignPrompt] = useState('');

    const t = TRANSLATIONS[language];

    const generatePrompt = () => {
      const selectedColorsStr = colors.slice(0, colorCount).join(', ');
      let prompt = `${WOGGLE_CORE_DEFINITION}\nProfessional 2D vector artwork for Scout Woggle.\n`;
      prompt += `Category: ${selectedCategory} | Colors: ${selectedColorsStr}\n`;
      prompt += `Shown as cylindrical ring holding rolled neckerchief. Pure white background.`;
      setDesignPrompt(prompt);
    };

    return (
      <div className="min-h-screen bg-[#0F172A] text-slate-100 font-sans">
        <header className="bg-slate-900 border-b border-slate-700 px-6 py-4 flex justify-between">
          <div className="flex items-center gap-3">
            <i data-lucide="shield" className="w-5 h-5 bg-cyan-500 p-1.5 rounded-lg"></i>
            <h1 className="text-lg font-black">{t.title}</h1>
          </div>
          <select value={language} onChange={e => setLanguage(e.target.value)} className="bg-slate-800 text-white p-2 rounded">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
          </select>
        </header>

        <main className="p-8">
          <button onClick={generatePrompt} className="bg-cyan-600 px-6 py-3 rounded text-white font-bold">
            生成設計 Prompt
          </button>
          <div className="mt-8 bg-slate-900 p-6 rounded">
            <h2 className="text-cyan-400 mb-2">Generated Prompt:</h2>
            <pre className="whitespace-pre-wrap text-sm">{designPrompt || '按鈕生成...'}</pre>
          </div>
        </main>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>

<script>
  lucide.createIcons();
</script>
